<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRON | Neural Interface</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --primary-glow: #00d4ff;
            --secondary-glow: #7000ff;
            --accent-glow: #00ff88;
            --bg-color: #010103;
            --ui-color: rgba(0, 212, 255, 0.85);
            --glass-bg: rgba(2, 5, 12, 0.6);
            --font-main: 'Space Grotesk', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --panel-border: rgba(0, 212, 255, 0.15);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: var(--font-main);
            color: var(--ui-color);
            /* Neural Grid Background */
            background-image: 
                linear-gradient(rgba(0, 212, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* Main HUD Container */
        .hud-interface {
            display: flex;
            width: 95vw;
            height: 85vh;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border: 1px solid var(--panel-border);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 100px rgba(0, 0, 0, 0.9);
        }

        /* Scanline Overlay */
        .hud-interface::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 20;
        }

        /* Left Pane: Neural Core */
        .neural-pane {
            flex: 0 0 40%;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--panel-border);
            position: relative;
            background: rgba(0, 0, 0, 0.2);
        }

        #canvas-container {
            flex: 1;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .controls-overlay {
            padding: 30px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.6));
            border-top: 1px solid var(--panel-border);
        }

        /* Right Pane: Communication Terminal */
        .terminal-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 40px;
            position: relative;
        }

        .pane-header {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: rgba(0, 212, 255, 0.4);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
        }

        #response-area {
            flex: 1;
            overflow-y: auto;
            font-size: 20px;
            font-weight: 300;
            line-height: 1.7;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
            padding-right: 20px;
        }

        /* Custom Scrollbar */
        #response-area::-webkit-scrollbar { width: 3px; }
        #response-area::-webkit-scrollbar-thumb { background: var(--primary-glow); opacity: 0.3; }

        .input-group {
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px;
            border: 1px solid var(--panel-border);
            border-radius: 4px;
        }

        input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            padding: 15px;
            outline: none;
            font-family: var(--font-mono);
            font-size: 14px;
        }

        button {
            background: var(--primary-glow);
            color: var(--bg-color);
            border: none;
            padding: 0 35px;
            cursor: pointer;
            font-weight: 700;
            font-family: var(--font-main);
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        button:hover {
            filter: brightness(1.2);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .control-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Sleek Switches */
        .switch {
            position: relative;
            display: inline-block;
            width: 34px;
            height: 16px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255, 255, 255, 0.1);
            transition: .4s;
            border-radius: 16px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 10px; width: 10px;
            left: 3px; bottom: 3px;
            background-color: #555;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider:before { 
            transform: translateX(18px); 
            background-color: var(--primary-glow);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        #offline-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 0, 0, 0.5);
            font-size: 12px;
            letter-spacing: 15px;
            display: none;
            z-index: 30;
        }
    </style>
</head>
<body>
    <div id="offline-overlay">CRITICAL ERROR: LINK SEVERED</div>

    <main class="hud-interface">
        <!-- Left: Neural Visualizer -->
        <section class="neural-pane">
            <div class="pane-header" style="padding: 20px 30px 0;">
                <span>Neural Core: <span id="active-model">Online</span></span>
            </div>
            <div id="canvas-container"></div>
            <div class="controls-overlay">
                <div class="controls">
                    <div class="control-item">
                        <span>Voice Output</span>
                        <label class="switch">
                            <input type="checkbox" id="voice-toggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="control-item">
                        <span>Force Local</span>
                        <label class="switch">
                            <input type="checkbox" id="force-local-toggle" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </div>
        </section>

        <!-- Right: Command Terminal -->
        <section class="terminal-pane">
            <div class="pane-header">
                <span>Communication Terminal</span>
                <span>Link: <span id="link-status">Stable</span></span>
            </div>
            <div id="response-area">SYSTEM READY. AWAITING COMMAND...</div>
            <div class="input-group">
                <input type="text" id="user-input" placeholder="Initiate sequence..." autocomplete="off">
                <button id="send-btn">Execute</button>
            </div>
        </section>
    </main>

    <script>
        let scene, camera, renderer, particles, particleSystem;
        let isOnline = true;
        const particleCount = 15000;
        
        function initThree() {
            const container = document.getElementById('canvas-container');
            const width = container.clientWidth;
            const height = container.clientHeight;

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
            camera.position.z = 4.5;
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(width, height);
            container.appendChild(renderer.domElement);
            
            particles = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);
            
            const colorPalette = [
                new THREE.Color(0x00d4ff), 
                new THREE.Color(0x9400d3), 
                new THREE.Color(0x0055ff),
                new THREE.Color(0x00ffff)
            ];

            for (let i = 0; i < particleCount; i++) {
                const theta = Math.random() * 2 * Math.PI;
                const phi = Math.acos(2 * Math.random() - 1);
                const r = 2.0 * Math.pow(Math.random(), 1/2);
                
                positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                positions[i * 3 + 2] = r * Math.cos(phi);
                
                const color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
                colors[i * 3] = color.r; 
                colors[i * 3 + 1] = color.g; 
                colors[i * 3 + 2] = color.b;
            }
            
            particles.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            particles.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            
            const pMaterial = new THREE.PointsMaterial({ 
                size: 0.015, 
                vertexColors: true, 
                transparent: true, 
                blending: THREE.AdditiveBlending, 
                opacity: 0.6 
            });
            
            particleSystem = new THREE.Points(particles, pMaterial);
            scene.add(particleSystem);
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.0006;
            if (!particleSystem) return;
            const positions = particleSystem.geometry.attributes.position.array;
            
            if (isOnline) {
                for (let i = 0; i < particleCount; i++) {
                    const i3 = i * 3;
                    const x = positions[i3];
                    const y = positions[i3 + 1];
                    const z = positions[i3 + 2];
                    
                    positions[i3] += (Math.sin(time * 0.7 + y * 1.2) * 0.004 + Math.cos(time * 0.4 + z * 0.9) * 0.003);
                    positions[i3+1] += (Math.sin(time * 0.5 + x * 1.1) * 0.004 + Math.cos(time * 0.8 + z * 1.3) * 0.003);
                    positions[i3+2] += (Math.sin(time * 0.6 + x * 0.8) * 0.004 + Math.cos(time * 0.9 + y * 1.0) * 0.003);
                    
                    const dist = Math.sqrt(x*x + y*y + z*z);
                    if (dist > 2.8) {
                        const pull = 0.97;
                        positions[i3] *= pull;
                        positions[i3+1] *= pull;
                        positions[i3+2] *= pull;
                    }

                    positions[i3] += (Math.random() - 0.5) * 0.001;
                    positions[i3+1] += (Math.random() - 0.5) * 0.001;
                    positions[i3+2] += (Math.random() - 0.5) * 0.001;
                }
                
                particleSystem.rotation.y += 0.0004;
                particleSystem.rotation.x += 0.0002;
                particleSystem.material.opacity = 0.35 + Math.sin(time * 1.2) * 0.1;
            } else {
                particleSystem.material.opacity = 0.08;
            }
            
            particleSystem.geometry.attributes.position.needsUpdate = true;
            renderer.render(scene, camera);
        }

        const modelDisplay = document.getElementById('active-model');
        const linkStatus = document.getElementById('link-status');
        const localToggle = document.getElementById('force-local-toggle');

        async function checkHealth() {
            try {
                const res = await fetch('/health');
                const data = await res.json();
                isOnline = data.status === 'online';
                if (localToggle.checked) {
                    modelDisplay.innerText = "Local: " + data.local_model;
                } else {
                    modelDisplay.innerText = "Cloud: " + data.model;
                }
                linkStatus.innerText = "Active";
                document.getElementById('offline-overlay').style.display = 'none';
            } catch {
                isOnline = false;
                modelDisplay.innerText = "Unknown";
                linkStatus.innerText = "Severed";
                document.getElementById('offline-overlay').style.display = 'block';
            }
        }
        setInterval(checkHealth, 3000);
        checkHealth();

        const input = document.getElementById('user-input');
        const btn = document.getElementById('send-btn');
        const responseArea = document.getElementById('response-area');
        const voiceToggle = document.getElementById('voice-toggle');

        async function sendPrompt() {
            const prompt = input.value.trim();
            if (!prompt || !isOnline) return;
            input.value = '';
            responseArea.innerText = localToggle.checked ? "COMMUNICATING WITH LOCAL NEURAL CORE..." : "CONSULTING CLOUD NETWORKS...";
            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        prompt: prompt,
                        voice_enabled: voiceToggle.checked,
                        force_local: localToggle.checked
                    })
                });
                const data = await response.json();
                responseArea.innerText = data.response;
                if (localToggle.checked) {
                    modelDisplay.innerText = "Local: " + data.model.replace("Local: ", "");
                } else {
                    modelDisplay.innerText = data.model;
                }
            } catch (e) {
                responseArea.innerText = "❌ NEURAL LINK SEVERED";
            }
        }
        btn.addEventListener('click', sendPrompt);
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendPrompt(); });
        
        // Ensure the scene is initialized after the container is ready
        window.addEventListener('load', initThree);
        
        // Handle window resizing
        window.addEventListener('resize', () => {
            const container = document.getElementById('canvas-container');
            const width = container.clientWidth;
            const height = container.clientHeight;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        });
    </script>
</body>
</html>
